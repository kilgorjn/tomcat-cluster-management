name: Build and Release TCM Package

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r console/requirements.txt -r agent/requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    name: Build tar.gz Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Build Vue frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build tcm package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG="tcm-${VERSION}"
          mkdir -p "${PKG}"
          mkdir -p "${PKG}/frontend"

          # Copy application code
          cp -r console/ "${PKG}/console/"
          cp -r frontend/dist/ "${PKG}/frontend/dist/"
          cp -r agent/ "${PKG}/agent/"
          cp -r shared/ "${PKG}/shared/"

          # Copy operational files
          cp -r bin/ "${PKG}/bin/"
          cp -r scripts/ "${PKG}/scripts/"
          cp -r systemd/ "${PKG}/systemd/"
          cp -r config/ "${PKG}/config/"

          # Copy docs and README
          cp -r docs/ "${PKG}/docs/"
          cp README.md "${PKG}/"

          # Ensure scripts are executable
          chmod +x "${PKG}"/bin/*.sh
          chmod +x "${PKG}"/scripts/*.sh
          chmod +x "${PKG}"/systemd/install_systemd.sh

          # Remove __pycache__ and .pyc files
          find "${PKG}" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "${PKG}" -name '*.pyc' -delete 2>/dev/null || true

          # Create tar.gz
          tar -czf "${PKG}.tar.gz" "${PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcm-${{ steps.version.outputs.VERSION }}
          path: tcm-${{ steps.version.outputs.VERSION }}.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: tcm-${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tcm-${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
