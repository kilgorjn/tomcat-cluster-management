role: console

console:
  host: 0.0.0.0
  port: 9000
  config_root: /etc/tcm
  log_dir: /var/log/tcm

logging:
  level: INFO
  format: json

policy_enforcement:
  enabled: false
  check_interval: 30
  node_timeout: 10

deployment:
  max_parallel_nodes: 10
  health_check_timeout: 10
  startup_timeout: 60
